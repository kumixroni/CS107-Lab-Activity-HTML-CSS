<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinnamoroll Portfolio - Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --champagne-pink: #ECE0DA;
      --tea-rose: #F1C8CB;
      --cherry-blossom: #F6B0BB;
      --cambridge-blue: #9CAD8C;
      --reseda-green: #7E8C69;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
      background-color: var(--champagne-pink);
      color: var(--reseda-green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .navbar {
      background-color: var(--white);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px dashed var(--tea-rose);
      z-index: 10;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cherry-blossom);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-logo img {
      width: 35px;
      height: auto;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--reseda-green);
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .nav-links a:hover {
      background-color: var(--tea-rose);
      color: var(--white);
    }

    .selection-container {
      flex: 1;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 3rem;
      padding: 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .menu-card {
      flex: 1;
      height: 450px;
      max-width: 450px;
      width: 100%;
      text-decoration: none;
      position: relative;
      border-radius: 40px;
      border: 4px solid var(--tea-rose);
      background-color: rgba(255, 255, 255, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(126, 140, 105, 0.15);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  box-shadow 0.4s ease, 
                  border-color 0.4s ease;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.6s ease;
      z-index: 1;
    }

    .about-btn::before {
      background-image: url('about-bg.jpg');
    }

    .resume-btn::before {
      background-image: url('resume-bg.jpg');
    }

    .menu-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(236, 224, 218, 0.4), rgba(246, 176, 187, 0.4));
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 2;
    }

    .menu-text-bubble {
      background-color: var(--white);
      color: var(--reseda-green);
      font-size: 2.2rem;
      font-weight: 700;
      padding: 1.5rem 3rem;
      border-radius: 30px;
      border: 3px solid var(--cambridge-blue);
      box-shadow: 0 6px 0 var(--cambridge-blue);
      z-index: 3;
      transition: all 0.4s ease;
    }

    .menu-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: var(--cherry-blossom);
      box-shadow: 0 20px 35px rgba(246, 176, 187, 0.4);
    }

    .menu-card:hover::before {
      opacity: 1;
      transform: scale(1.05);
    }

    .menu-card:hover::after {
      opacity: 1;
    }

    .menu-card:hover .menu-text-bubble {
      background-color: var(--cherry-blossom);
      color: var(--white);
      border-color: var(--white);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 6px 0 var(--tea-rose);
      transform: scale(1.05);
    }

    .menu-card:active {
      transform: translateY(-4px);
    }

    .footer {
      background-color: var(--reseda-green);
      color: var(--champagne-pink);
      text-align: center;
      padding: 1.5rem;
      font-size: 1rem;
      letter-spacing: 1px;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .nav-links {
        width: 100%;
        justify-content: center;
        gap: 0.5rem;
      }

      .nav-links a {
        font-size: 1rem;
        padding: 0.4rem 0.8rem;
      }

      .selection-container {
        flex-direction: column;
        gap: 2rem;
        padding: 2rem 1rem;
      }

      .menu-card {
        height: 280px;
      }

      .menu-text-bubble {
        font-size: 1.8rem;
        padding: 1rem 2rem;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-logo">
      <img src="cinnamoroll-logo.jpg" alt="Cinnamoroll">
      <span>Chris' Portfolio</span>
    </div>
    <nav class="nav-links">
      <a href="homepage.html">Home</a>
      <a href="about.html">About Me</a>
      <a href="resume.html">Resume</a>
    </nav>
  </header>

  <main class="selection-container">
    
    <a href="about.html" class="menu-card about-btn">
      <div class="menu-text-bubble">About Me</div>
    </a>

    <a href="resume.html" class="menu-card resume-btn">
      <div class="menu-text-bubble">Resume</div>
    </a>

  </main>

  <footer class="footer">
    <p>☁️ Designed with Effiency and Comfort in mind ☁️</p>
  </footer>

</body>
</html>

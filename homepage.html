<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinnamoroll Portfolio - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  
  <style>

    :root {
      --champagne-pink: #ECE0DA;
      --tea-rose: #F1C8CB;
      --cherry-blossom: #F6B0BB;
      --cambridge-blue: #9CAD8C;
      --reseda-green: #7E8C69;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
      background-color: var(--champagne-pink);
      color: var(--reseda-green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    .navbar {
      background-color: var(--white);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px dashed var(--tea-rose);
      z-index: 10;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cherry-blossom);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-logo img {
      width: 35px;
      height: auto;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--reseda-green);
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .nav-links a:hover, 
    .nav-links a.active {
      background-color: var(--tea-rose);
      color: var(--white);
    }

    .hero-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      z-index: 5;
    }

    .hero-card {
      width: 100%;
      max-width: 800px;
      background-color: rgba(255, 255, 255, 0.6);
      padding: 3rem 2rem;
      border-radius: 40px;
      border: 4px solid var(--tea-rose);
      text-align: center;
      box-shadow: 0 10px 25px rgba(126, 140, 105, 0.1);
    }

    .sub-heading {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--cambridge-blue);
      margin-bottom: 1.5rem;
    }

    .cloud-bubble {
      background-color: var(--cherry-blossom);
      padding: 2.5rem 2rem;
      border-radius: 50px;
      display: inline-block;
      margin-bottom: 2.5rem;
      position: relative;
      box-shadow: 0 8px 0 var(--tea-rose);
    }

    .cloud-bubble h1 {
      font-size: 2.5rem;
      color: var(--white);
      line-height: 1.3;
      font-weight: 600;
    }

    .button-container {
      margin-top: 1rem;
    }

    .btn-order {
      display: inline-block;
      text-decoration: none;
      background-color: var(--champagne-pink);
      color: var(--reseda-green);
      font-size: 1.3rem;
      font-weight: 700;
      padding: 1rem 3.5rem;
      border-radius: 50px;
      border: 3px solid var(--reseda-green);
      cursor: pointer;
      box-shadow: 0 0 0 rgba(246, 176, 187, 0);
      transition: transform 0.2s ease, box-shadow 0.3s ease, background-color 0.3s ease;
    }

    .btn-order:hover {
      transform: translateY(-3px);
      background-color: var(--white);
      box-shadow: 0 0 25px 8px rgba(246, 176, 187, 0.7);
    }

    .btn-order:active {
      transform: translateY(1px);
      box-shadow: 0 0 15px 4px rgba(246, 176, 187, 0.5);
    }

    .cinnamoroll-bg {
      position: absolute;
      z-index: 1;
      pointer-events: none;
    }

    .img-top-left {
      top: 15%;
      left: 5%;
      width: 120px;
    }

    .img-top-right {
      top: 18%;
      right: 6%;
      width: 130px;
    }

    .img-bottom-left {
      bottom: 12%;
      left: 8%;
      width: 110px;
    }

    .img-bottom-right {
      bottom: 10%;
      right: 5%;
      width: 140px;
    }

    .footer {
      background-color: var(--reseda-green);
      color: var(--champagne-pink);
      text-align: center;
      padding: 1.5rem;
      font-size: 1rem;
      letter-spacing: 1px;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .nav-links {
        width: 100%;
        justify-content: center;
        gap: 0.5rem;
      }

      .nav-links a {
        font-size: 1rem;
        padding: 0.4rem 0.8rem;
      }

      .hero-card {
        padding: 2rem 1rem;
        border-radius: 30px;
      }

      .cloud-bubble {
        padding: 1.8rem 1.2rem;
        border-radius: 30px;
        width: 100%;
      }

      .cloud-bubble h1 {
        font-size: 1.6rem;
      }

      .btn-order {
        padding: 0.9rem 2.5rem;
        font-size: 1.1rem;
        width: 80%;
      }

      .cinnamoroll-bg {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-logo">
      <img src="cinnamoroll-logo.jpg" alt="Cinnamoroll">
      <span>Chris' Portfolio</span>
    </div>
    <nav class="nav-links">
      <a href="homepage.html" class="active">Home</a>
      <a href="about.html">About Me</a>
      <a href="resume.html">Resume</a>
    </nav>
  </header>

  <img src="cinnamoroll1.png" alt="" class="cinnamoroll-bg img-top-left">
  <img src="cinnamoroll2.png" alt="" class="cinnamoroll-bg img-top-right">
  <img src="cinnamoroll3.png" alt="" class="cinnamoroll-bg img-bottom-left">
  <img src="cinnamoroll4.png" alt="" class="cinnamoroll-bg img-bottom-right">

  <main class="hero-container">
    <div class="hero-card">
      <p class="sub-heading">DECODING MY WORLD, ONE SIP AT A TIME</p>
      
      <div class="cloud-bubble">
        <h1>Transforming Caffeine into Code,<br>One Perfect Brew at a Time.</h1>
      </div>

      <div class="button-container">
        <a href="about.html" class="btn-order">Order Now</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>☁️ Designed with Effiency and Comfort in mind ☁️</p>
  </footer>

</body>
</html>
